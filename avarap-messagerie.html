<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messagerie — Avarap Connect</title>
<link rel="stylesheet" href="avarap-style.css">
</head>
<body class="app-shell">
  <div id="topbar-root"></div>

  <main class="page">
    <div class="page-header">
      <div>
        <h1>Messagerie</h1>
        <p>Échanges privés et confidentiels entre membres du réseau.</p>
      </div>
    </div>

    <div class="messenger">
      <div class="conv-list" id="conv-list"></div>
      <div class="chat-col">
        <div class="chat-header" id="chat-header"></div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Écrivez votre message…">
          <button class="btn btn-primary" id="send-btn">Envoyer</button>
        </div>
      </div>
    </div>
  </main>

  <p class="footnote">Avarap Connect — prototype de démonstration, données fictives. Les échanges restent confidentiels entre membres.</p>

  <script src="avarap-data.js"></script>
  <script src="avarap-app.js"></script>
  <script>
    renderTopbar("messagerie");

    let activeConvId = CONVERSATIONS[0].id;

    function renderConvList() {
      document.getElementById("conv-list").innerHTML = CONVERSATIONS.map(c => {
        const person = getMember(c.withId);
        const last = c.messages[c.messages.length - 1];
        return `
          <div class="conv-item ${c.id === activeConvId ? "active" : ""}" data-conv="${c.id}">
            <div class="avatar" style="background:var(--navy-700);">${person.initials}</div>
            <div style="min-width:0; flex:1;">
              <div class="name truncate">${person.name}</div>
              <div class="preview truncate">${escapeHtml(last.text)}</div>
            </div>
            ${c.unread ? `<span class="badge badge-gold">${c.unread}</span>` : ""}
          </div>
        `;
      }).join("");

      document.querySelectorAll(".conv-item").forEach(el => {
        el.addEventListener("click", () => {
          activeConvId = el.dataset.conv;
          const conv = CONVERSATIONS.find(c => c.id === activeConvId);
          conv.unread = 0;
          renderConvList();
          renderChat();
        });
      });
    }

    function renderChat() {
      const conv = CONVERSATIONS.find(c => c.id === activeConvId);
      const person = getMember(conv.withId);
      document.getElementById("chat-header").innerHTML = `
        <a href="avarap-profil.html?id=${person.id}" class="avatar" style="background:var(--navy-700);">${person.initials}</a>
        <div>
          <div style="font-weight:700; font-size:13.5px;">${person.name}</div>
          <div style="font-size:12px; color:var(--ink-400);">${person.groupe}</div>
        </div>
      `;
      document.getElementById("chat-messages").innerHTML = conv.messages.map(m => `
        <div class="bubble ${m.from === "me" ? "out" : "in"}">${escapeHtml(m.text)}<time>${m.time}</time></div>
      `).join("");
      document.getElementById("chat-messages").scrollTop = 999999;
    }

    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("chat-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
    function sendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;
      const conv = CONVERSATIONS.find(c => c.id === activeConvId);
      conv.messages.push({ from: "me", text, time: "À l'instant" });
      input.value = "";
      renderChat();
      renderConvList();
    }

    renderConvList();
    renderChat();
  </script>
</body>
</html>
